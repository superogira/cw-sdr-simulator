# ═══════════════════════════════════════════════════════════════
# CW SDR — Apache Configuration for aaPanel
# Add this to your site configuration: cw.e25wop.com
# ═══════════════════════════════════════════════════════════════
#
# Required Apache modules (enable in aaPanel → Apache → Modules):
#   - proxy_module
#   - proxy_http_module
#   - proxy_wstunnel_module
#   - headers_module
#   - rewrite_module
#
# How to use in aaPanel:
#   1. Go to Website → cw.e25wop.com → Settings → Config File
#   2. Add the ProxyPass directives inside your <VirtualHost> block
#   3. Save and restart Apache
# ═══════════════════════════════════════════════════════════════

# Add these lines INSIDE your existing <VirtualHost *:443> block:

    # ── WebSocket Proxy for Socket.io ──
    # This MUST come before the general proxy rule
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule /socket.io/(.*) ws://127.0.0.1:3000/socket.io/$1 [P,L]

    # Socket.io HTTP fallback
    ProxyPass /socket.io/ http://127.0.0.1:3000/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:3000/socket.io/

    # ── App Proxy ──
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ── Headers ──
    ProxyPreserveHost On
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # ── Timeouts for long-lived WebSocket connections ──
    ProxyTimeout 3600
    ProxyBadHeader Ignore
